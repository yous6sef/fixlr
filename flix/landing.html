<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flix - منصة الخدمات المنزلية المتقدمة</title>
    
    <link rel="stylesheet" href="/css/premium-ui.css">
    <link rel="stylesheet" href="/css/animations-enhanced.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        html[dir="rtl"] body {
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .hero-section {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: var(--spacing-3xl) var(--spacing-lg);
        }
        
        .hero-section h1 {
            color: white;
            font-size: clamp(2.5rem, 8vw, 4rem);
            line-height: 1.2;
            margin-bottom: var(--spacing-lg);
        }
        
        .hero-section p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.125rem;
            margin-bottom: var(--spacing-xl);
        }
        
        .booking-card {
            background: white;
            border-radius: var(--radius-2xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-xl);
        }
        
        .service-badge {
            padding: var(--spacing-md);
            border-radius: var(--radius-lg);
            border: 2px solid var(--neutral-200);
            cursor: pointer;
            transition: all var(--transition-base);
        }
        
        .service-badge:hover {
            border-color: var(--primary);
            background-color: var(--neutral-50);
        }
        
        .service-badge.active {
            border-color: var(--primary);
            background-color: rgba(14, 165, 233, 0.1);
        }
        
        .section-title {
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: var(--spacing-3xl);
            color: var(--neutral-900);

            display: grid;

            margin-bottom: var(--spacing-3xl);

            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border-radius: 50%;

            justify-content: center;

<body>
    <div id="root"></div>

                    setLoading(true);
                    setTimeout(() => {
                        const serviceName = services.find(s => s.id === selected)?.name;

                        top: 0,
                        zIndex: 50

                            margin: '0 auto', 
                            display: 'flex', 
                            justifyContent: 'space-between', 
                            alignItems: 'center'

                            <h1 style={{ fontSize: '2rem', fontWeight: 900, color: 'var(--primary)' }}>Flix</h1>
                            
                            {/* Desktop Menu */}

                                    <div>⏱️ وصول سريع جدًا</div>
                                </div>
                            </div>

                                        {services.map(s => (
                                            <div
                                                key={s.id}
                                                className={`service-badge ${selected === s.id ? 'active' : ''}`}
                                                onClick={() => setSelected(s.id)}
                                            >
                                                <div style={{ fontSize: '2rem', marginBottom: 'var(--spacing-sm)' }}>{s.icon}</div>
                                                <div style={{ fontWeight: 600, fontSize: '0.875rem' }}>{s.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Location Input */}
                                <div style={{ marginBottom: 'var(--spacing-lg)' }}>

                                            value={location}
                                            onChange={(e) => setLocation(e.target.value)}

                                                flex: 1, 
                                                padding: 'var(--spacing-md)', 
                                                border: '2px solid var(--neutral-200)', 
                                                borderRadius: 'var(--radius-lg)',
                                                fontSize: '1rem',
                                                fontFamily: 'inherit'

                                        </div>
                                    </div>

                                <button

                                    disabled={!selected || !location || loading}
                                    className={`btn ${selected && location && !loading ? 'btn-primary' : ''}`}
                                    style={{ 
                                        width: '100%',
                                        opacity: selected && location && !loading ? 1 : 0.5,
                                        cursor: selected && location && !loading ? 'pointer' : 'not-allowed'
                                    }}
                                >
                                    {loading ? '🔄 جاري البحث...' : '⚡ اطلب الخدمة الآن'}
                                </button>
                            </div>

                                            <span style={{ fontSize: '0.875rem' }}>⭐ 4.8/5</span>
                                            <span style={{ padding: 'var(--spacing-xs) var(--spacing-md)', background: 'var(--success)', color: 'white', borderRadius: 'var(--radius-full)', fontSize: '0.75rem', fontWeight: 600 }}>متاح</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* How It Works */}
                    <section id="how" style={{ padding: 'var(--spacing-3xl) var(--spacing-lg)', background: 'var(--neutral-50)' }}>

                            <h2 className="section-title">كيف يعمل النظام؟</h2>
                            <div className="feature-grid">
                                <div style={{ textAlign: 'center' }}>
                                    <div className="step-badge">1</div>
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: 'var(--spacing-md)' }}>اطلب الخدمة</h3>
                                    <p style={{ color: 'var(--neutral-600)' }}>اختر نوع الخدمة وحدد موقعك على الخريطة</p>
                                </div>
                                <div style={{ textAlign: 'center' }}>
                                    <div className="step-badge">2</div>
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: 'var(--spacing-md)' }}>اختر الفني</h3>
                                    <p style={{ color: 'var(--neutral-600)' }}>شاهد الفنيين المتاحين والتقييمات والأسعار</p>
                                </div>
                                <div style={{ textAlign: 'center' }}>
                                    <div className="step-badge">3</div>
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: 'var(--spacing-md)' }}>استمتع بالخدمة</h3>
                                    <p style={{ color: 'var(--neutral-600)' }}>الفني يصل وينفذ الشغل باحترافية</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="tech" className="hero-section">
                        <div style={{ maxWidth: '1400px', margin: '0 auto', textAlign: 'center' }}>
                            <h2 className="hero-section" style={{ color: 'white', marginBottom: 'var(--spacing-lg)' }}>هل أنت فني محترف؟</h2>
                            <p style={{ fontSize: '1.25rem', marginBottom: 'var(--spacing-xl)', color: 'rgba(255,255,255,0.9)' }}>انضم لفليكس وحقق دخل إضافي مستقر</p>
                            <div className="feature-grid">
                                <div>
                                    <div style={{ fontSize: '3rem', marginBottom: 'var(--spacing-md)' }}>💰</div>
                                    <h3 style={{ color: 'white', marginBottom: 'var(--spacing-sm)' }}>دخل مرن</h3>
                                    <p style={{ color: 'rgba(255,255,255,0.9)' }}>اشتغل بالوقت اللي تختاره</p>
                                </div>
                                <div>
                                    <div style={{ fontSize: '3rem', marginBottom: 'var(--spacing-md)' }}>👥</div>
                                    <h3 style={{ color: 'white', marginBottom: 'var(--spacing-sm)' }}>عملاء كثيرون</h3>
                                    <p style={{ color: 'rgba(255,255,255,0.9)' }}>وصول لآلاف العملاء</p>
                                </div>
                                <div>
                                    <div style={{ fontSize: '3rem', marginBottom: 'var(--spacing-md)' }}>🛡️</div>
                                    <h3 style={{ color: 'white', marginBottom: 'var(--spacing-sm)' }}>دعم كامل</h3>
                                    <p style={{ color: 'rgba(255,255,255,0.9)' }}>دعم فني 24/7</p>
                                </div>
                            </div>
                            <button className="btn" style={{ background: 'white', color: 'var(--primary)', fontWeight: 700, marginTop: 'var(--spacing-xl)' }}>
                                👷 سجل كفني الآن
                            </button>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer style={{ background: 'var(--neutral-900)', color: 'white', padding: 'var(--spacing-3xl) var(--spacing-lg)' }}>
                        <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: 'var(--spacing-xl)', marginBottom: 'var(--spacing-xl)', paddingBottom: 'var(--spacing-xl)', borderBottom: '1px solid var(--neutral-700)' }}>
                                <div>
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: 'var(--spacing-md)', color: 'var(--primary)' }}>Flix</h3>
                                    <p style={{ color: 'var(--neutral-400)', fontSize: '0.875rem' }}>منصة ربط الفنيين الموثوقين بالعملاء</p>
                                </div>
                                <div>
                                    <h4 style={{ fontWeight: 700, marginBottom: 'var(--spacing-md)' }}>الخدمات</h4>
                                    <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 'var(--spacing-md)', color: 'var(--neutral-400)', fontSize: '0.875rem' }}>
                                        <li><a href="#services" style={{ color: 'inherit', textDecoration: 'none' }}>الخدمات الكاملة</a></li>
                                        <li><a href="#how" style={{ color: 'inherit', textDecoration: 'none' }}>كيف يعمل</a></li>
                                        <li><a href="#tech" style={{ color: 'inherit', textDecoration: 'none' }}>للفنيين</a></li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 style={{ fontWeight: 700, marginBottom: 'var(--spacing-md)' }}>الشركة</h4>
                                    <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 'var(--spacing-md)', color: 'var(--neutral-400)', fontSize: '0.875rem' }}>

                                        <li><a href="#" style={{ color: 'inherit', textDecoration: 'none' }}>الدعم الفني</a></li>
                                        <li><a href="#" style={{ color: 'inherit', textDecoration: 'none' }}>الأسئلة الشائعة</a></li>
                                        <li><a href="#" style={{ color: 'inherit', textDecoration: 'none' }}>تواصل معنا</a></li>

                            </div>

            );

        // Render App
        try {
            const container = document.getElementById('root');
            if (container) {
                const root = ReactDOM.createRoot(container);
                root.render(<App />);
            }
        } catch (error) {
            console.error('Render error:', error);
        }
    </script>
</body>
</html>
